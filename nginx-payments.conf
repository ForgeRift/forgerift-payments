# Add this server block to /etc/nginx/sites-available/ on the VPS
# Then: ln -s /etc/nginx/sites-available/payments /etc/nginx/sites-enabled/payments
# Then: nginx -t && systemctl reload nginx
#
# Replace YOUR_VPS_IP with your actual VPS IP address.

server {
    listen 443 ssl;
    server_name payments.YOUR_VPS_IP.sslip.io;

    ssl_certificate     /etc/letsencrypt/live/payments.YOUR_VPS_IP.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/payments.YOUR_VPS_IP.sslip.io/privkey.pem;

    # Stripe sends large payloads for some webhook events
    client_max_body_size 2m;

    location /health {
        proxy_pass http://127.0.0.1:3020/health;
        proxy_set_header Host $host;
    }

    location /webhook {
        proxy_pass http://127.0.0.1:3020/webhook;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required: preserve the raw body for Stripe signature verification
        # Do NOT set proxy_buffering off — nginx must buffer to pass raw body intact
        proxy_request_buffering on;
        proxy_read_timeout 30s;
    }
}

server {
    listen 80;
    server_name payments.YOUR_VPS_IP.sslip.io;
    return 301 https://$host$request_uri;
}
